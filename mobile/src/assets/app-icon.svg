<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="appbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#1A3F7A"/>
    </linearGradient>
    <linearGradient id="appchild" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6A94A"/>
      <stop offset="100%" stop-color="#E8832A"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" rx="224" fill="url(#appbg)"/>

  <!-- ground -->
  <rect x="82" y="870" width="860" height="28" rx="14" fill="white" opacity=".1"/>

  <!-- village left -->
  <circle cx="148" cy="820" r="36" fill="white" opacity=".22"/>
  <rect x="120" y="854" width="56" height="48" rx="28" fill="white" opacity=".18"/>
  <!-- village left 2 -->
  <circle cx="274" cy="800" r="40" fill="white" opacity=".28"/>
  <rect x="244" y="838" width="60" height="52" rx="30" fill="white" opacity=".22"/>

  <!-- village right -->
  <circle cx="876" cy="820" r="36" fill="white" opacity=".22"/>
  <rect x="848" y="854" width="56" height="48" rx="28" fill="white" opacity=".18"/>
  <!-- village right 2 -->
  <circle cx="750" cy="800" r="40" fill="white" opacity=".28"/>
  <rect x="720" y="838" width="60" height="52" rx="30" fill="white" opacity=".22"/>

  <!-- left pillar -->
  <rect x="120" y="330" width="130" height="560" rx="65" fill="white" opacity=".92"/>
  <circle cx="185" cy="220" r="110" fill="white" opacity=".92"/>

  <!-- right pillar (equal) -->
  <rect x="774" y="330" width="130" height="560" rx="65" fill="white" opacity=".92"/>
  <circle cx="839" cy="220" r="110" fill="white" opacity=".92"/>

  <!-- bridge cable -->
  <path d="M185 330 Q512 530 839 330" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" opacity=".75"/>

  <!-- hangers -->
  <line x1="340" y1="418" x2="340" y2="620" stroke="white" stroke-width="14" stroke-linecap="round" opacity=".28"/>
  <line x1="512" y1="472" x2="512" y2="674" stroke="white" stroke-width="14" stroke-linecap="round" opacity=".28"/>
  <line x1="684" y1="418" x2="684" y2="620" stroke="white" stroke-width="14" stroke-linecap="round" opacity=".28"/>

  <!-- child glow -->
  <circle cx="512" cy="730" r="160" fill="#F6A94A" opacity=".18"/>
  <!-- child body -->
  <circle cx="512" cy="730" r="116" fill="url(#appchild)"/>
  <!-- face -->
  <circle cx="476" cy="710" r="18" fill="white" opacity=".85"/>
  <circle cx="548" cy="710" r="18" fill="white" opacity=".85"/>
  <path d="M476 758 Q512 792 548 758" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity=".85"/>
</svg>
