services:
  - type: web
    name: coparent-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:server
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: coparent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: coparent-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://co-parent-app-mu.vercel.app

  - type: redis
    name: coparent-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Only internal access
