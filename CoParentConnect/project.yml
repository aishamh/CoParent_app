name: CoParentConnect
options:
  bundleIdPrefix: com.coparent
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Resources/CoParentConnect.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: SP337KYTD8
    CODE_SIGN_STYLE: Automatic

targets:
  CoParentConnect:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "**/*.md"
          - "project.yml"
          - "*.xcodeproj"
          - "*.xcworkspace"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coparent.connect
